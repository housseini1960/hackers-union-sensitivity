<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKERS UNION SENSITIVITY ULTRA V3</title>
    <style>
        body {
            background-color: #04060a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #0d131f;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00ff80;
            box-shadow: 0 0 20px rgba(0, 255, 128, 0.2);
        }
        h1 {
            color: #00ff80;
            font-size: 24px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 255, 128, 0.5);
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #1a2333;
            border: 1px solid #334466;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: #00ff80;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #00cc66;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00ff80;
            box-shadow: 0 0 15px rgba(0, 255, 128, 0.4);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #141c2c;
            border-radius: 8px;
            border-left: 4px solid #00ff80;
            text-align: left;
            display: none;
        }
        .result-title {
            color: #00ff80;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid #334466;
            padding-bottom: 5px;
        }
        .spec-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 4px 0;
            border-bottom: 1px dashed #223355;
        }
        .spec-item b {
            color: #00ff80;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HACKERS UNION SENSITIVITY</h1>
    
    <input type="text" id="brand" placeholder="Marque exacte (ex: Samsung, Itel, Tecno)">
    <input type="number" id="ram" placeholder="Mémoire RAM exacte (en Go)">
    
    <select id="power">
        <option value="medium">Milieu de gamme (Standard)</option>
        <option value="low">Entrée de gamme (Fluide léger)</option>
        <option value="high">Haut de gamme (Gaming / Puissant)</option>
    </select>
    
    <button onclick="generateSettings()">GÉNÉRER LES RÉGLAGES PRO</button>
    
    <div id="result" class="result-box"></div>
</div>

<script>
    function generateSettings() {
        let ram = parseInt(document.getElementById('ram').value);
        let power = document.getElementById('power').value;
        let brandInput = document.getElementById('brand').value.trim().toLowerCase();
        
        if (isNaN(ram) || ram <= 0 || brandInput === "") {
            alert("Veuillez remplir correctement la marque et la RAM.");
            return;
        }
        
        // 1. Coefficient de puissance matérielle selon le constructeur
        let brandModifier = 0;
        if (brandInput.includes("samsung") || brandInput.includes("iphone") || brandInput.includes("apple") || brandInput.includes("xiaomi")) {
            brandModifier = 12; // Écrans et processeurs plus réactifs de base
        } else if (brandInput.includes("tecno") || brandInput.includes("infinix")) {
            brandModifier = -5;  // Compensation de la sensibilité tactile
        } else if (brandInput.includes("itel")) {
            brandModifier = -15; // Gros coup de boost nécessaire pour l'entrée de gamme
        }

        // 2. Multiplicateur selon la gamme sélectionnée
        let powerMultiplier = 1;
        let perfStatus = "Configuration Équilibrée";
        if (power === "low") {
            powerMultiplier = 1.15;
            perfStatus = "Optimisation Basse Puissance Active";
        } else if (power === "high") {
            powerMultiplier = 0.85;
            perfStatus = "Stabilisation Moteur Gaming Active";
        }

        // 3. Calculs croisés pour des résultats uniques à chaque appareil
        let baseDpi = Math.round((411 + (150 / ram) - brandModifier) * powerMultiplier);
        
        let sensiGenerale = Math.round(Math.min(95 + (brandModifier / 5) - (ram * 0.8), 100));
        let redDot = Math.round(Math.min(sensiGenerale + 3 + (ram * 0.3), 100));
        let x2 = Math.round(sensiGenerale - 5 + (brandModifier * 0.2));
        let x4 = Math.round(sensiGenerale - 8 + (brandModifier * 0.2));
        let awm = Math.round(50 - (ram * 0.5));
        let lookFree = Math.round(70 + (brandModifier * 0.3));
        
        // Calcul millimétré de la taille du bouton de tir
        let buttonSize = Math.round(45 + (ram * 1.2) + (brandModifier * 0.3));

        let resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <div class="result-title">⚡ PANNEAU ULTRA - ${brandInput.toUpperCase()} (${ram}Go RAM) :</div>
            <div class="spec-item"><span>📐 <b>DPI OPTIMAL :</b></span> <b>${baseDpi}</b></div>
            <div class="spec-item"><span>🕹️ Sensibilité Générale :</span> <span>${sensiGenerale}</span></div>
            <div class="spec-item"><span>🔴 Point Rouge (Red Dot) :</span> <span>${redDot}</span></div>
            <div class="spec-item"><span>🔍 Lunette x2 :</span> <span>${x2}</span></div>
            <div class="spec-item"><span>🔭 Lunette x4 :</span> <span>${x4}</span></div>
            <div class="spec-item"><span>🎯 Sniper (AWM) :</span> <span>${awm}</span></div>
            <div class="spec-item"><span>👀 Regard Libre :</span> <span>${lookFree}</span></div>
            <div class="spec-item"><span>🔘 <b>BOUTON DE TIR :</b></span> <b>${buttonSize}%</b></div>
            <div class="spec-item"><span>🤖 Profil Puissance :</span> <span style="color:#00ff80;">${perfStatus}</span></div>
            <p style="color: #ffcc00; margin-top: 15px; font-size:14px; font-style:italic;">🔥 IA Hackers Union : Vos réglages calculés sur l'empreinte matérielle de l'appareil !</p>
        `;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
