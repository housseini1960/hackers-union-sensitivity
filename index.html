<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKERS UNION SENSITIVITY AI V4</title>
    <style>
        body {
            background-color: #04060a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #0d131f;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00ff80;
            box-shadow: 0 0 20px rgba(0, 255, 128, 0.2);
        }
        h1 {
            color: #00ff80;
            font-size: 24px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 255, 128, 0.5);
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #1a2333;
            border: 1px solid #334466;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: #00ff80;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #00cc66;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00ff80;
            box-shadow: 0 0 15px rgba(0, 255, 128, 0.4);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #141c2c;
            border-radius: 8px;
            border-left: 4px solid #00ff80;
            text-align: left;
            display: none;
        }
        .result-title {
            color: #00ff80;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid #334466;
            padding-bottom: 5px;
        }
        .spec-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 4px 0;
            border-bottom: 1px dashed #223355;
        }
        .spec-item b {
            color: #00ff80;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HACKERS UNION SENSITIVITY</h1>
    
    <input type="text" id="brand" placeholder="Modèle exact (ex: Samsung A52, Itel A80)">
    <input type="number" id="ram" placeholder="Mémoire RAM (en Go)">
    
    <select id="power">
        <option value="medium">Milieu de gamme (Standard)</option>
        <option value="low">Entrée de gamme (Fluide léger)</option>
        <option value="high">Haut de gamme (Gaming / Puissant)</option>
    </select>
    
    <button onclick="generateSettings()">GÉNÉRER LES RÉGLAGES PRO</button>
    
    <div id="result" class="result-box"></div>
</div>

<script>
    function generateSettings() {
        let ram = parseInt(document.getElementById('ram').value);
        let power = document.getElementById('power').value;
        let modelInput = document.getElementById('brand').value.trim().toLowerCase();
        
        if (isNaN(ram) || ram <= 0 || modelInput === "") {
            alert("Veuillez remplir correctement le modèle et la RAM.");
            return;
        }
        
        // 1. Détection intelligente de la puce selon le nom écrit
        let modelScore = 0;
        let cpuDetected = "Processeur Standard";
        
        // Analyse des modèles spécifiques pour séparer les puissances
        if (modelInput.includes("a52") || modelInput.includes("ultra") || modelInput.includes("pro") || modelInput.includes("iphone")) {
            modelScore = 25; // Boost de stabilité pour processeur puissant (ex: Snapdragon 720G / Apple Bionic)
            cpuDetected = "Moteur Haute Fréquence Détecté 🚀";
        } else if (modelInput.includes("a22") || modelInput.includes("a12") || modelInput.includes("spark") || modelInput.includes("neo")) {
            modelScore = 5;  // Gamme intermédiaire
            cpuDetected = "Moteur Médium Détecté ⚙️";
        } else if (modelInput.includes("a80") || modelInput.includes("itel") || modelInput.includes("pop")) {
            modelScore = -15; // Compensation de lag pour puces plus faibles
            cpuDetected = "Moteur Basse Consommation Détecté 🛡️";
        }

        // 2. Gestion de la marque générale
        let brandModifier = 0;
        if (modelInput.includes("samsung") || modelInput.includes("xiaomi")) brandModifier = 10;
        if (modelInput.includes("tecno") || modelInput.includes("infinix")) brandModifier = -5;

        // 3. Multiplicateur de gamme
        let powerMultiplier = 1;
        if (power === "low") powerMultiplier = 1.12;
        if (power === "high") powerMultiplier = 0.88;

        // 4. Calculs croisés uniques : A22 et A52 n'auront plus JAMAIS la même chose !
        let baseDpi = Math.round((411 + (160 / ram) - brandModifier - (modelScore * 0.8)) * powerMultiplier);
        
        let sensiGenerale = Math.round(Math.min(94 + (brandModifier / 4) + (modelScore / 6) - (ram * 0.7), 100));
        let redDot = Math.round(Math.min(sensiGenerale + 4 + (ram * 0.2), 100));
        let x2 = Math.round(sensiGenerale - 4 + (modelScore * 0.1));
        let x4 = Math.round(sensiGenerale - 7 + (modelScore * 0.1));
        let awm = Math.round(50 - (ram * 0.4) + (modelScore * 0.1));
        let lookFree = Math.round(70 + (brandModifier * 0.2));
        
        let buttonSize = Math.round(46 + (ram * 1.1) + (modelScore * 0.2));

        let resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <div class="result-title">⚡ PANNEAU SMART AI - ${modelInput.toUpperCase()} :</div>
            <div class="spec-item"><span>⚙️ <b>ANALYSE MATÉRIELLE :</b></span> <span style="color:#00ff80;">${cpuDetected}</span></div>
            <div class="spec-item"><span>📐 <b>DPI OPTIMAL :</b></span> <b>${baseDpi}</b></div>
            <div class="spec-item"><span>🕹️ Sensibilité Générale :</span> <span>${sensiGenerale}</span></div>
            <div class="spec-item"><span>🔴 Point Rouge (Red Dot) :</span> <span>${redDot}</span></div>
            <div class="spec-item"><span>🔍 Lunette x2 :</span> <span>${x2}</span></div>
            <div class="spec-item"><span>🔭 Lunette x4 :</span> <span>${x4}</span></div>
            <div class="spec-item"><span>🎯 Sniper (AWM) :</span> <span>${awm}</span></div>
            <div class="spec-item"><span>👀 Regard Libre :</span> <span>${lookFree}</span></div>
            <div class="spec-item"><span>🔘 <b>BOUTON DE TIR :</b></span> <b>${buttonSize}%</b></div>
            <p style="color: #ffcc00; margin-top: 15px; font-size:14px; font-style:italic;">🔥 Base IA Hackers Union : Profil unique généré d'après la signature de votre processeur !</p>
        `;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
