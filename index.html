<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKERS UNION SENSITIVITY PRO V2</title>
    <style>
        body {
            background-color: #04060a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #0d131f;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00ff80;
            box-shadow: 0 0 20px rgba(0, 255, 128, 0.2);
        }
        h1 {
            color: #00ff80;
            font-size: 24px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 255, 128, 0.5);
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #1a2333;
            border: 1px solid #334466;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: #00ff80;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #00cc66;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00ff80;
            box-shadow: 0 0 15px rgba(0, 255, 128, 0.4);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #141c2c;
            border-radius: 8px;
            border-left: 4px solid #00ff80;
            text-align: left;
            display: none;
        }
        .result-title {
            color: #00ff80;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid #334466;
            padding-bottom: 5px;
        }
        .spec-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 4px 0;
            border-bottom: 1px dashed #223355;
        }
        .spec-item b {
            color: #00ff80;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HACKERS UNION SENSITIVITY</h1>
    
    <input type="text" id="brand" placeholder="Marque du téléphone (ex: Infinix, Tecno)">
    <input type="number" id="ram" placeholder="Mémoire RAM (en Go)">
    
    <select id="power">
        <option value="medium">Milieu de gamme (Standard)</option>
        <option value="low">Entrée de gamme (Fluide léger)</option>
        <option value="high">Haut de gamme (Gaming / Puissant)</option>
    </select>
    
    <button onclick="generateSettings()">GÉNÉRER LES RÉGLAGES PRO</button>
    
    <div id="result" class="result-box"></div>
</div>

<script>
    function generateSettings() {
        let ram = parseInt(document.getElementById('ram').value);
        let power = document.getElementById('power').value;
        let brand = document.getElementById('brand').value;
        
        if (isNaN(ram) || ram <= 0) {
            alert("Veuillez entrer un chiffre valide pour la RAM.");
            return;
        }
        
        // Algorithme étendu pour toutes les sensibilités
        let baseDpi = 411;
        let sensiGenerale = 90;
        let redDot = 95;
        let x2 = 88;
        let x4 = 85;
        let awm = 50;
        let lookFree = 70;
        let buttonSize = 45;
        let perfStatus = "Configuration Équilibrée";
        
        if (ram <= 3) {
            baseDpi += 90;
            sensiGenerale += 8;
            redDot = 99;
            buttonSize = 42; // Plus petit bouton pour les petits écrans
        } else if (ram <= 6) {
            baseDpi += 50;
            sensiGenerale += 5;
            redDot = 95;
            buttonSize = 48;
        } else {
            baseDpi += 30;
            sensiGenerale += 2;
            redDot = 92;
            buttonSize = 52;
        }
        
        if (power === "low") {
            baseDpi += 30;
            sensiGenerale = Math.min(sensiGenerale + 3, 100);
            redDot = 100;
            x2 += 5;
            x4 += 5;
            perfStatus = "Optimisation Anti-Lag activée";
        } else if (power === "high") {
            baseDpi -= 15;
            sensiGenerale = Math.max(sensiGenerale - 2, 85);
            x2 -= 3;
            x4 -= 3;
            perfStatus = "Stabilisation Haute Performance activée";
        }
        
        let resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <div class="result-title">⚡ PANNEAU PRO - ${brand.toUpperCase()} (${ram}Go RAM) :</div>
            <div class="spec-item"><span>📐 <b>DPI OPTIMAL :</b></span> <b>${baseDpi}</b></div>
            <div class="spec-item"><span>🕹️ Sensibilité Générale :</span> <span>${sensiGenerale}</span></div>
            <div class="spec-item"><span>🔴 Point Rouge (Red Dot) :</span> <span>${redDot}</span></div>
            <div class="spec-item"><span>🔍 Lunette x2 :</span> <span>${x2}</span></div>
            <div class="spec-item"><span>🔭 Lunette x4 :</span> <span>${x4}</span></div>
            <div class="spec-item"><span>🎯 Sniper (AWM) :</span> <span>${awm}</span></div>
            <div class="spec-item"><span>👀 Regard Libre :</span> <span>${lookFree}</span></div>
            <div class="spec-item"><span>🔘 <b>BOUTON DE TIR DE JEU :</b></span> <b>${buttonSize}%</b></div>
            <div class="spec-item"><span>🤖 Statut Processeur :</span> <span style="color:#00ff80;">${perfStatus}</span></div>
            <p style="color: #ffcc00; margin-top: 15px; font-size:14px; font-style:italic;">🔥 Astuce Hackers Union : Forcez la vitesse de pointeur au maximum dans Android !</p>
        `;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
