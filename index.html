  <script>
    const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
    let copiedTextStore = { codm: "", freefire: "", blood: "" };
    let glowState = { mobile: false, neon: false, stable: false };

    function currentTab() {
      return document.getElementById('panelFree').classList.contains('active') ? 'freefire' : document.getElementById('panelBlood').classList.contains('active') ? 'blood' : 'codm';
    }

    function buildMenu(tab) {
      const menu = document.getElementById('mobileMenu');
      const list = ['codm','freefire','blood'].filter(x=>x!==tab);
      menu.innerHTML = `<button type="button" onclick="jumpTo('${tab}')"><i class="fa-solid fa-circle text-green-400"></i> ${tab.toUpperCase()}</button>` + list.map(x=>`<button type="button" onclick="jumpTo('${x}')"><i class="fa-solid fa-circle text-cyan-400"></i> ${x.toUpperCase()}</button>`).join('') + `<button type="button" onclick="quickReset()"><i class="fa-solid fa-rotate-left text-cyan-300"></i> Reset Current</button><button type="button" onclick="copyCurrent()"><i class="fa-solid fa-copy text-yellow-300"></i> Copy Current</button>`;
    }

    function toggleMenu(force) {
      const menu = document.getElementById('mobileMenu');
      const backdrop = document.getElementById('menuBackdrop');
      const shouldOpen = typeof force === 'boolean' ? force : !menu.classList.contains('open');
      if (shouldOpen) buildMenu(currentTab());
      menu.classList.toggle('open', shouldOpen);
      backdrop.classList.toggle('open', shouldOpen);
    }

    function jumpTo(tab) {
      setActiveTab(tab);
      toggleMenu(false);
      document.getElementById(tab === 'codm' ? 'panelCodm' : tab === 'freefire' ? 'panelFree' : 'panelBlood').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function quickAction(action) { if (action === 'home') window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function quickReset() {
      if (currentTab() === 'codm') resetCodm();
      else if (currentTab() === 'freefire') resetFreefire();
      else resetBlood();
      toggleMenu(false);
    }

    function copyCurrent() {
      copyResult(currentTab());
      toggleMenu(false);
    }

    function toggleGlow(key) {
      glowState[key] = !glowState[key];
      document.body.style.filter = Object.values(glowState).some(Boolean) ? 'saturate(1.1) contrast(1.05)' : 'none';
    }

    function setActiveTab(tab) {
      document.getElementById('tabCodm').classList.toggle('active', tab === 'codm');
      document.getElementById('tabFree').classList.toggle('active', tab === 'freefire');
      document.getElementById('tabBlood').classList.toggle('active', tab === 'blood');
      document.getElementById('panelCodm').classList.toggle('active', tab === 'codm');
      document.getElementById('panelFree').classList.toggle('active', tab === 'freefire');
      document.getElementById('panelBlood').classList.toggle('active', tab === 'blood');
      localStorage.setItem('activeGameTab', tab);
      buildMenu(tab);
    }

    function switchTab(tab) { setActiveTab(tab); }

    function hashString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function detectCodmPower(model) {
      const m = model.toLowerCase();
      const flagship = ["s24","s23","s22","iphone 15","iphone 14","iphone 13","poco f6","x6 pro","rog","black shark","snapdragon 8","dimensity 9300","dimensity 9200","snapdragon 8 gen 3"];
      const upperMid = ["s21","s20","iphone 12","note 13 pro","note 12 pro","poco x6","dimensity 8200","dimensity 8300","snapdragon 7","realme gt","oneplus nord"];
      const midrange = ["redmi","xiaomi","realme","infinix","tecno","spark","galaxy a","a1","a2","a3","a5","moto g","oppo a"];
      for (const item of flagship) if (m.includes(item)) return { score: 48, level: "Flagship", fps: "90 FPS", graphics: "Ultra" };
      for (const item of upperMid) if (m.includes(item)) return { score: 34, level: "Upper Mid-Range", fps: "90 FPS", graphics: "Very High" };
      for (const item of midrange) if (m.includes(item)) return { score: 18, level: "Mid-Range", fps: "60 FPS", graphics: "High" };
      return { score: 10, level: "Unknown / Entry-Level", fps: "60 FPS", graphics: "Medium" };
    }

    function detectFreefirePower(model) {
      const m = model.toLowerCase();
      if (m.includes("iphone") || m.includes("s23") || m.includes("s24") || m.includes("snapdragon 8") || m.includes("dimensity 9300") || m.includes("rog") || m.includes("black shark")) return { score: 46, level: "Flagship", fps: "90 FPS", graphics: "Ultra" };
      if (m.includes("pro") || m.includes("ultra") || m.includes("note 12 pro") || m.includes("note 13 pro") || m.includes("x6 pro") || m.includes("dimensity 8200") || m.includes("snapdragon 7")) return { score: 32, level: "Upper Mid-Range", fps: "90 FPS", graphics: "Very High" };
      if (m.includes("a5") || m.includes("a3") || m.includes("a2") || m.includes("redmi") || m.includes("infinix") || m.includes("tecno") || m.includes("spark")) return { score: 18, level: "Mid-Range", fps: "60 FPS", graphics: "High" };
      return { score: 9, level: "Entry-Level", fps: "60 FPS", graphics: "Medium" };
    }

    function detectBloodPower(model) {
      const m = model.toLowerCase();
      if (m.includes("iphone") || m.includes("s23") || m.includes("s24") || m.includes("snapdragon 8") || m.includes("dimensity 9300") || m.includes("rog") || m.includes("black shark")) return { score: 44, level: "Flagship", fps: "90 FPS", graphics: "Ultra" };
      if (m.includes("pro") || m.includes("ultra") || m.includes("note 12 pro") || m.includes("note 13 pro") || m.includes("x6 pro") || m.includes("dimensity 8200") || m.includes("snapdragon 7")) return { score: 31, level: "Upper Mid-Range", fps: "90 FPS", graphics: "Very High" };
      if (m.includes("a5") || m.includes("a3") || m.includes("a2") || m.includes("redmi") || m.includes("infinix") || m.includes("tecno") || m.includes("spark")) return { score: 17, level: "Mid-Range", fps: "60 FPS", graphics: "High" };
      return { score: 8, level: "Entry-Level", fps: "60 FPS", graphics: "Medium" };
    }

    function buildText(modelInput, ram, powerData, mode, prefix) {
      const seed = hashString(modelInput + "|" + ram + "|" + mode + "|" + prefix);
      const modelBoost = (seed % 13) - 6;
      const ramScore = ram * 11;
      const totalScore = ramScore + powerData.score + modelBoost;
      let modeBoost = 0;
      if (mode === "high") modeBoost = 6;
      if (mode === "low") modeBoost = -4;
      const general = clamp(Math.round(40 + totalScore * 0.72 + modeBoost), 30, 100);
      const ads = clamp(Math.round(36 + totalScore * 0.66 + modeBoost), 25, 100);
      const scope4x = clamp(Math.round(30 + totalScore * 0.56 + modeBoost), 20, 100);
      const redDot = clamp(general - 2, 25, 100);
      const x2 = clamp(ads - 4, 20, 100);
      const sniper = clamp(Math.round(28 + totalScore * 0.45 + modeBoost), 15, 100);
      const dpi = clamp(Math.round(380 + (ram * 8) + powerData.score + (seed % 17)), 320, 980);
      const buttonSize = clamp(Math.round(42 + (ram * 1.8) + (powerData.score / 4)), 35, 70);
      return {
        text: `${modelInput.toUpperCase()} | ${powerData.level} | RAM ${ram} GB | ${mode.toUpperCase()} | DPI ${dpi} | GEN ${general} | ADS ${ads} | 4X ${scope4x} | RED DOT ${redDot} | 2X ${x2} | SNIPER ${sniper} | BUTTON ${buttonSize}% | ${powerData.graphics} | ${powerData.fps}`,
        html: `
          <div class="result-line"><span class="label">📐 Optimal DPI</span><span class="value">${dpi}</span></div>
          <div class="result-line"><span class="label">🕹️ General Sensitivity</span><span class="value">${general}</span></div>
          <div class="result-line"><span class="label">🔴 Red Dot</span><span class="value">${redDot}</span></div>
          <div class="result-line"><span class="label">🔍 2x Scope</span><span class="value">${x2}</span></div>
          <div class="result-line"><span class="label">🔭 4x Scope</span><span class="value">${scope4x}</span></div>
          <div class="result-line"><span class="label">🎯 Sniper</span><span class="value">${sniper}</span></div>
          <div class="result-line"><span class="label">🔘 Button Size</span><span class="value yellow">${buttonSize}%</span></div>
          <div class="result-line"><span class="label">📺 Graphics Quality</span><span class="value">${powerData.graphics}</span></div>
          <div class="result-line"><span class="label">⚡ FPS Target</span><span class="value">${powerData.fps}</span></div>
        `
      };
    }

    function generateCodm() {
      const modelInput = document.getElementById('codmModel').value.trim();
      const ram = parseInt(document.getElementById('codmRam').value, 10);
      const mode = document.getElementById('codmPower').value;
      if (!modelInput || isNaN(ram) || ram <= 0) return alert("Please enter a valid phone model and RAM.");
      const out = buildText(modelInput, ram, detectCodmPower(modelInput), mode, 'codm');
      document.getElementById('codmDeviceName').textContent = modelInput.toUpperCase();
      document.getElementById('codmSettings').innerHTML = out.html;
      document.getElementById('codmResult').classList.remove('hidden');
      copiedTextStore.codm = out.text;
    }

    function resetCodm() {
      document.getElementById('codmModel').value = '';
      document.getElementById('codmRam').value = '';
      document.getElementById('codmPower').value = 'medium';
      document.getElementById('codmResult').classList.add('hidden');
      copiedTextStore.codm = '';
    }

    async function copyResult(game) {
      const text = copiedTextStore[game];
      if (!text) return alert("Generate settings first.");
      try {
        await navigator.clipboard.writeText(text);
        alert("Results copied!");
      } catch (e) {
        alert("Copy failed on this browser");
      }
    }

    window.addEventListener('load', () => {
      const tab = localStorage.getItem('activeGameTab') || 'codm';
      setActiveTab(tab);
      buildMenu(tab);
    });
