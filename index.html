<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKERS UNION SENSITIVITY AI V5</title>
    <style>
        body {
            background-color: #04060a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #0d131f;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00ff80;
            box-shadow: 0 0 20px rgba(0, 255, 128, 0.2);
        }
        h1 {
            color: #00ff80;
            font-size: 24px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 255, 128, 0.5);
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #1a2333;
            border: 1px solid #334466;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: #00ff80;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #00cc66;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00ff80;
            box-shadow: 0 0 15px rgba(0, 255, 128, 0.4);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #141c2c;
            border-radius: 8px;
            border-left: 4px solid #00ff80;
            text-align: left;
            display: none;
        }
        .result-title {
            color: #00ff80;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid #334466;
            padding-bottom: 5px;
        }
        .spec-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 4px 0;
            border-bottom: 1px dashed #223355;
        }
        .spec-item b {
            color: #00ff80;
        }
        .loading {
            color: #ffcc00;
            font-style: italic;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HACKERS UNION SENSITIVITY</h1>
    
    <input type="text" id="brand" placeholder="Modèle complet (ex: Samsung A52, Itel A80)">
    <input type="number" id="ram" placeholder="Mémoire RAM (en Go)">
    
    <select id="power">
        <option value="medium">Milieu de gamme (Standard)</option>
        <option value="low">Entrée de gamme (Fluide léger)</option>
        <option value="high">Haut de gamme (Gaming / Puissant)</option>
    </select>
    
    <button onclick="searchAndCalculate()">GÉNÉRER LES RÉGLAGES PRO</button>
    <div id="loader" class="loading">🔍 Scan de la base de données mondiale en cours...</div>
    
    <div id="result" class="result-box"></div>
</div>

<script>
    function searchAndCalculate() {
        let ram = parseInt(document.getElementById('ram').value);
        let power = document.getElementById('power').value;
        let modelInput = document.getElementById('brand').value.trim();
        
        if (isNaN(ram) || ram <= 0 || modelInput === "") {
            alert("Veuillez remplir correctement le modèle et la RAM.");
            return;
        }

        document.getElementById('loader').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        // Connexion à l'API gratuite de fiches techniques de smartphones
        fetch(`https://api-mobilespec.sazharimm.site/v2/search?query=${encodeURIComponent(modelInput)}`)
        .then(response => response.json())
        .then(data => {
            let cpuDetected = "Processeur Standard";
            let apiBonus = 0;

            // Si l'API trouve le téléphone, on analyse ses spécificités
            if (data.status && data.data.phones.length > 0) {
                let fullDetail = data.data.phones[0].phone_name.toLowerCase();
                
                // Analyse dynamique pour séparer chirurgicalement le A22 du A52
                if (fullDetail.includes("a52") || fullDetail.includes("snapdragon") || fullDetail.includes("pro") || fullDetail.includes("ultra")) {
                    apiBonus = 20; 
                    cpuDetected = "Puce Haute Performance Réseau active 🚀";
                } else if (fullDetail.includes("a22") || fullDetail.includes("helio") || fullDetail.includes("spark")) {
                    apiBonus = 5;
                    cpuDetected = "Puce Équilibrée Réseau active ⚙️";
                } else {
                    apiBonus = -10;
                    cpuDetected = "Puce Standard Réseau active 🛡️";
                }
            } else {
                cpuDetected = "Mode Hors-ligne (Modèle non répertorié)";
            }

            // Calculs basés sur la RAM + les caractéristiques de l'API
            let powerMultiplier = (power === "low") ? 1.12 : (power === "high" ? 0.88 : 1);
            let baseDpi = Math.round((411 + (160 / ram) - (apiBonus * 0.8)) * powerMultiplier);
            let sensiGenerale = Math.round(Math.min(94 + (apiBonus / 4) - (ram * 0.7), 100));
            let redDot = Math.round(Math.min(sensiGenerale + 4 + (ram * 0.2), 100));
            let x2 = Math.round(sensiGenerale - 4 + (apiBonus * 0.1));
            let x4 = Math.round(sensiGenerale - 7 + (apiBonus * 0.1));
            let awm = Math.round(50 - (ram * 0.4));
            let lookFree = Math.round(72);
            let buttonSize = Math.round(46 + (ram * 1.1) + (apiBonus * 0.1));

            document.getElementById('loader').style.display = 'none';
            let resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="result-title">⚡ PANNEAU SMART NETWORK - ${modelInput.toUpperCase()} :</div>
                <div class="spec-item"><span>📡 <b>INFO API EN LIGNE :</b></span> <span style="color:#00ff80;">${cpuDetected}</span></div>
                <div class="spec-item"><span>📐 <b>DPI OPTIMAL :</b></span> <b>${baseDpi}</b></div>
                <div class="spec-item"><span>🕹️ Sensibilité Générale :</span> <span>${sensiGenerale}</span></div>
                <div class="spec-item"><span>🔴 Point Rouge (Red Dot) :</span> <span>${redDot}</span></div>
                <div class="spec-item"><span>🔍 Lunette x2 :</span> <span>${x2}</span></div>
                <div class="spec-item"><span>🔭 Lunette x4 :</span> <span>${x4}</span></div>
                <div class="spec-item"><span>🎯 Sniper (AWM) :</span> <span>${awm}</span></div>
                <div class="spec-item"><span>👀 Regard Libre :</span> <span>${lookFree}</span></div>
                <div class="spec-item"><span>🔘 <b>BOUTON DE TIR :</b></span> <b>${buttonSize}%</b></div>
                <p style="color: #ffcc00; margin-top: 15px; font-size:14px; font-style:italic;">🔥 Base IA Hackers Union : Données matérielles vérifiées en ligne sans surcoût !</p>
            `;
            resultDiv.style.display = 'block';
        })
        .catch(error => {
            // Sécurité en cas de coupure réseau de l'API
            document.getElementById('loader').style.display = 'none';
            alert("Erreur de connexion à l'API. Vos réglages par défaut s'appliqueront.");
        });
    }
</script>

</body>
</html>
